<div class="auth-container">
  <div class="auth-card">
    <div class="brand-header">
      <svg class="med-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
      <h1>Nuevo Ingreso</h1>
      <p>Crea tu cuenta en Medicheck</p>
    </div>

    <form class="auth-form" (ngSubmit)="onRegister()">
      <div class="input-group">
        <label for="name">Nombre Completo</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          [(ngModel)]="nuevoUsuario.name" 
          placeholder="Ej. Dra. Ana Silva"
          required>
      </div>

      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="nuevoUsuario.email" 
          placeholder="ejemplo@correo.com"
          required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="nuevoUsuario.password" 
          placeholder="Crea una contraseña segura"
          required>
      </div>

      <div class="input-group">
        <label for="role">Tipo de Cuenta</label>
        <div class="select-wrapper">
          <select id="role" name="role" [(ngModel)]="nuevoUsuario.role" required>
            <option value="paciente">Soy Paciente</option>
            <option value="medico">Soy Médico Profesional</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary">Crear Cuenta</button>
    </form>
    
    <div class="redirect-prompt">
      ¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a>
    </div>
  </div>
</div>
