<div class="auth-container">
  <div class="auth-card">
    <div class="brand-header">
      <!-- Ícono de Escudo Seguro -->
      <svg class="med-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <polyline points="9 12 11 14 15 10"></polyline>
      </svg>
      <h1>Nueva Contraseña</h1>
      <p>Establece una nueva clave de acceso para tu expediente</p>
    </div>

    <form class="auth-form" (ngSubmit)="onReset()">
      
      <div class="input-group">
        <label for="new-password">Nueva Contraseña</label>
        <input 
          type="password" 
          id="new-password" 
          name="newPassword"
          [(ngModel)]="password" 
          placeholder="Escribe tu nueva clave"
          required>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirm-password" 
          name="confirmPassword"
          [(ngModel)]="confirmPassword" 
          placeholder="Repite tu nueva clave"
          required>
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Guardar contraseña' }}
      </button>

      <!-- Mensajes de feedback -->
      <div *ngIf="mensajeExito" class="alert success-alert">
        {{ mensajeExito }}
      </div>
      <div *ngIf="mensajeError" class="alert error-alert">
        {{ mensajeError }}
      </div>

    </form>
    
    <div class="redirect-prompt">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
