<div class="contenedor-app">
  <div class="encabezado">
    <button class="btn-volver" (click)="cancelar()">← Volver</button>
    <h2>Editar Tratamiento</h2>
  </div>

  <div class="formulario-card">
    <div *ngIf="mensaje" class="alerta-exito">{{ mensaje }}</div>
    <div *ngIf="error" class="alerta-error">{{ error }}</div>

    <div class="campo">
      <label>Nombre del tratamiento</label>
      <input type="text" [(ngModel)]="formulario.tratamiento" placeholder="Ej: Tratamiento gripe" />
    </div>

    <div class="campo">
      <label>Hora de inicio</label>
      <input type="time" [(ngModel)]="formulario.horario_inicio" />
    </div>

    <div class="campo">
      <label>Frecuencia (cada cuántas horas)</label>
      <select [(ngModel)]="formulario.frecuencia_horas">
        <option [value]="4">Cada 4 horas</option>
        <option [value]="6">Cada 6 horas</option>
        <option [value]="8">Cada 8 horas</option>
        <option [value]="12">Cada 12 horas</option>
        <option [value]="24">Una vez al día</option>
      </select>
    </div>

    <div class="campo">
      <label>Duración (días)</label>
      <input type="number" [(ngModel)]="formulario.duracion_dias" min="1" max="365" />
    </div>

    <div class="botones">
      <button class="btn-cancelar" (click)="cancelar()">Cancelar</button>
      <button class="btn-guardar" (click)="guardarCambios()" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
    </div>
  </div>
</div>
