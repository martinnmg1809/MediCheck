<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      <svg class="med-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
      </svg>
      <h1>Medicheck</h1>
      <p>Portal de Acceso</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="credencial.email" 
          placeholder="ejemplo@correo.com"
          required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="credencial.password" 
          placeholder="••••••••"
          required>
      </div>

      <div class="form-actions">
        <a href="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    
    <div class="register-prompt">
      ¿No tienes una cuenta? <a href="/register">Regístrate aquí</a>
    </div>
  </div>
</div>
