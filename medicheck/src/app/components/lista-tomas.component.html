<div class="contenedor-app">
  <div class="navegacion-superior">
    <div class="selector-dia">
      <label>Tu horario del:</label>
      <select class="dropdown-semanal" [(ngModel)]="diaSeleccionado" (change)="filtrarPorDia()">
        <option *ngFor="let dia of diasSemana" [value]="dia.valor">
          {{ dia.nombre }}
        </option>
      </select>
    </div>
    <button class="btn-circular-add" (click)="irACrear()">+</button>
  </div>

  <div class="timeline-container">
    <div *ngIf="cargandoInicial" class="estado-carga">Cargando horario...</div>
    
    <div *ngIf="!cargandoInicial && medicamentosFiltrados.length === 0" class="sin-datos">
      <p>No tienes medicamentos programados para este día.</p>
    </div>

    <ul class="timeline" *ngIf="medicamentosFiltrados.length > 0">
      <li class="timeline-item" *ngFor="let item of medicamentosFiltrados">
        <div class="timeline-hora">
          <span>{{ item.horario_programado }}</span>
        </div>
        <div class="timeline-punto" [ngClass]="{'completado': item.verificado}"></div>
        <div class="timeline-contenido" [ngClass]="{'tarjeta-completada': item.verificado}">
          <div class="info-medicamento">
            <h3>{{ item.nombre_comercial }}</h3>
            <p class="principio">{{ item.principio_activo }} ({{ item.concentracion }})</p>
          </div>
          <div class="acciones-medicamento">
            <ng-container *ngIf="item.verificado; else botonTomar">
              <span class="etiqueta-tomado">✓ Tomado</span>
            </ng-container>
            <ng-template #botonTomar>
              <button class="btn-tomar" (click)="marcarTomado(item.toma_id)">
                Marcar Tomado
              </button>
            </ng-template>
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>
