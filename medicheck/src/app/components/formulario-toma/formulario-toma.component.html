<div class="contenedor-app">
  <div class="header-minimal">
    <button class="btn-text" (click)="irALista()">⬅ Volver a la agenda</button>
  </div>

  <div class="card-formulario">
    <h1 class="titulo-form">Programar medicación</h1>
    <p class="subtitulo-form">Organiza tus tomas de forma sencilla y clara</p>

    <div class="campo-grupo">
      <label>Medicamento</label>
      <input type="text" class="input-moderno mb-2" [(ngModel)]="filtroTexto" placeholder="Buscar nombre...">
      
      <select class="select-moderno" [(ngModel)]="medicamentoSeleccionado" (ngModelChange)="actualizarMedicamentoInfo()">
        <option value="" disabled selected>Selecciona el resultado</option>
        <option *ngFor="let med of filtrarMedicamentos()" [value]="med.id">
          {{ med.nombre_comercial }} ({{ med.concentracion }})
        </option>
      </select>
    </div>

    <div class="aviso-riesgo" *ngIf="esRiesgo">
      ⚠️ Medicamento de alto riesgo: el intervalo de toma es fijo por seguridad ({{ medicamentoInfo.motivo_riesgo }}). Solo puedes definir la hora de la primera toma.
    </div>

    <div class="campo-grupo">
      <label>Tratamiento</label>
      <input type="text" class="input-moderno mb-2" [(ngModel)]="tratamiento" placeholder="Ej: Amigdalitis">
    </div>

    <div class="fila-campos">
      <div class="campo-grupo">
        <label>Primera Toma</label>
        <input type="time" class="input-moderno" [(ngModel)]="nuevoHorario">
      </div>

      <div class="campo-grupo">
        <label>Cada (horas)</label>
        <input type="number" class="input-moderno" [(ngModel)]="frecuencia" placeholder="Ej: 8" min="1" [disabled]="esRiesgo">
      </div>
    </div>

    <div class="campo-grupo">
      <label>Durante (días)</label>
      <input type="number" class="input-moderno" [(ngModel)]="duracionDias" placeholder="Ej: 7" min="1">
    </div>

    <button class="btn-primario" (click)="crearTratamiento()" [disabled]="agregando">
      {{ agregando ? 'Guardando...' : 'Guardar programación' }}
    </button>
  </div>
</div>
